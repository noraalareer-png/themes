name: Theme QA

on:
  workflow_dispatch:
    inputs:
      preview_base:
        description: "Preview host base, e.g. https://i1o0np.dev.zid.store"
        required: true
      theme_id:
        description: "Theme id (uuid)"
        required: true
      report_to:
        description: "Email to receive the report"
        required: false
      theme_name:
        description: "Theme name / host"
        required: false
  repository_dispatch:
    types: [theme_submitted]

permissions:
  contents: read

concurrency:
  group: theme-qa-${{ github.event.inputs.theme_id || github.event.client_payload.theme_id }}
  cancel-in-progress: false

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      PREVIEW_BASE: ${{ github.event.inputs.preview_base || github.event.client_payload.preview_base }}
      THEME_ID: ${{ github.event.inputs.theme_id || github.event.client_payload.theme_id }}
      THEME_NAME: ${{ github.event.inputs.theme_name || github.event.client_payload.theme_name }}
      REPORT_TO: ${{ github.event.inputs.report_to || github.event.client_payload.report_to }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install beautifulsoup4

      # Layer 1 - structural gate (writes runs/<theme>/validate.json)
      - name: Structural validation (/validate)
        continue-on-error: true
        run: python validate_check.py --preview "$PREVIEW_BASE" --theme "$THEME_ID"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium

      # Layer 2 - functional / visual E2E (writes runs/<theme>/)
      - name: E2E tests
        continue-on-error: true
        run: npx playwright test

      # Build the single-file HTML report and email it to the requester (Resend)
      - name: Build report
        run: node scripts/build_report.js "$THEME_ID"
      - name: Email report
        run: node scripts/email_report.js "$THEME_ID"

      # Keep the report as a downloadable artifact on the run (optional)
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: theme-qa-report
          path: runs/${{ github.event.inputs.theme_id || github.event.client_payload.theme_id }}/report.html
          if-no-files-found: warn

      # Success metric = the AUTOMATION completed (report produced + emailed),
      # NOT whether the theme passed. Theme findings live inside the report.
      - name: Automation check
        run: |
          node -e "const fs=require('fs');const p='runs/'+process.env.THEME_ID+'/report.html';if(!fs.existsSync(p)){console.error('Automation did not complete: no report produced');process.exit(1)}console.log('Automation completed: report built and emailed')"
